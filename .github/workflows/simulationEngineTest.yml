name: Simulation Engine Test

on:
  push:
    paths: [ 'simulation-engine/**' ]
  pull_request:
    paths: [ 'simulation-engine/**' ]

jobs:
  test-simulation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Build Simulation Engine Image
      run: |
        docker build -t esim-simulation-engine simulation-engine/

    - name: Run and Verify Test Simulation
      run: |
        echo "===================================================="
        echo "  TESTING STANDALONE SIMULATION ENGINE"
        echo "===================================================="
        echo "Test Case: RC Filter Circuit (RC.cir)"
        echo "Description: Piping netlist to Docker, running NGSPICE, and parsing results."
        echo "----------------------------------------------------"
        
        OUTPUT=$(cat esim-cloud-backend/simulationAPI/helpers/sample_files/RC.cir | docker run -i esim-simulation-engine)
        
        if echo "$OUTPUT" | grep -q "total_number_of_tables"; then
          echo "✅ Simulation Successful!"
          echo ""
          echo "High-level Result Summary:"
          echo "$OUTPUT" | jq -r '.data[] | " - Table found with labels: [\(.labels | join(", "))] | Data points: \(.x | length)"'
          echo ""
          echo "Detailed JSON Output (Pretty Printed):"
          echo "$OUTPUT" | jq .
        else
          echo "❌ Simulation Failed or Output Malformed"
          echo "Raw Output: $OUTPUT"
          exit 1
        fi
        echo "===================================================="
